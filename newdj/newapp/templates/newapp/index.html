{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Form</title>
    <link rel="stylesheet" href="{% static 'newapp/style.css' %}">
</head>

<body>
    <div class="main-container">
        <div class="container">
            <form action="{% url 'userinputview' %}" method="POST">
                {% csrf_token %}
                <h1>User Input</h1>
                <table>
                    <tr>
                        <td><label for="">First Name</label></td>
                        <td><input type="text" name="fname"></td>
                    </tr>
                    <tr>
                        <td><label for="">Last Name</label></td>
                        <td><input type="text" name="lname"></td>
                    </tr>
                    <tr>
                        <td><label for="">Email address</label></td>
                        <td><input type="email" name="email"></td>
                    </tr>
                    <tr>
                        <td><label for="">Mobile number</label></td>
                        <td><input type="tel" name="mobile"></td>
                    </tr>
                    <tr>
                        <td class="inputbtn" align="center" colspan="3"><input class="inputbtn2" type="submit"
                                value="INPUT"></td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
</body>

</html>
